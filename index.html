<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website Under Maintenance</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      color: #333;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 600px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 20px;
      color: #222;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      color: #666;
    }

    .highlight {
      color: #007bff;
      font-weight: bold;
    }

    .loader {
      margin: 30px auto;
      width: 50px;
      height: 50px;
      border: 5px solid #ddd;
      border-top: 5px solid #007bff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    .footer {
      margin-top: 25px;
      font-size: 14px;
      color: #999;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>We'll Be Back Soon</h1>

    <div class="loader"></div>

    <p>
      Our website is currently undergoing scheduled maintenance
      to improve your experience.
    </p>

    <p style="margin-top: 15px;">
      Thank you for your patience.
      <span class="highlight">We'll be back shortly.</span>
    </p>

    <div class="footer">
      © 2026 Vakeel Babu & Associates
    </div>
  </div>
</body>
</html>
